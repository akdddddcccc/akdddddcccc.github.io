<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="ceshi.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="/static/jquery/jquery-1.11.1.min.js"></script>
    <link href="/static/materialize/css/materialize.min.css" rel="stylesheet">
    <script src="/static/materialize/js/materialize.min.js"></script>
    <style>
        .modal {
           display: none;
           position: fixed;
           z-index: 9999;
           top: 0;
           left: 0;
           width: 100%;
           height: 100%;
           background-color: rgba(0, 0, 0, 0.8);
        }
      
        .modal-image {
           display: block;
           max-width: 150%;
           max-height: 150%;
           margin: auto;
           margin-top: 5%;
        }
     </style>
      
 

</head>
<body>
    <img class="materialboxed" width="650" src="./images/概念画像 1.webp">
    <img src="./images/yang_max.png" alt="图像" onclick="showModal(this)">
      
    <div id="modal" class="modal" onclick="hideModal()">
      <img id="modal-image" class="modal-image">
    </div>
     
    <div class="parent">
        <div class="son">1</div>
        <div class="son">1</div>
        <div class="son">1</div>
        <div class="son">1</div>
        <div class="son">1</div>
    </div>
    <div class="img-group">
        <img src="./images/loading.webp">
        <div class="img-tip">我是雪豹</div>
    </div>

    <script>
        function showModal(image) {
           var modal = document.getElementById("modal");
           var modalImage = document.getElementById("modal-image");
           modal.style.display = "block";
           modalImage.src = image.src;
        }
      
        function hideModal() {
           var modal = document.getElementById("modal");
           modal.style.display = "none";
        }
     </script>
</body>

</html>
