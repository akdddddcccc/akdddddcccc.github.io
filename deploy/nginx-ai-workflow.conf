# Reverse proxy that gives the workflow backend a public HTTPS endpoint.
# The portfolio sites (HTTPS) require an HTTPS API origin — browsers block
# HTTPS pages from calling plain HTTP. Point index.html's
# window.__AI_WORKFLOW_API_BASE__ at https://api.your-unit-domain.com
#
# TLS certs: easiest is `certbot --nginx -d api.your-unit-domain.com`.

server {
    listen 443 ssl http2;
    server_name api.your-unit-domain.com;

    ssl_certificate     /etc/letsencrypt/live/api.your-unit-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.your-unit-domain.com/privkey.pem;

    # Image payloads are base64 data URLs; allow large request bodies.
    client_max_body_size 25m;

    location /api/ai-workflow/ {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Image generation can take a while; keep the connection open.
        proxy_read_timeout 200s;
        proxy_send_timeout 200s;
    }
}

server {
    listen 80;
    server_name api.your-unit-domain.com;
    return 301 https://$host$request_uri;
}
